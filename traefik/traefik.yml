api:
  dashboard: true

entryPoints:
  web:
    address: ":80"

  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: proxy

  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: owebra23@gmail.com
      storage: /certs/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO
